name: workspace-verify

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace_verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npm exec biome check .

      - name: TypeScript build
        run: npm run build

      - name: Test
        run: npm test
